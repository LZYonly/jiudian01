<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微光旅行 - 发现身边的宁静</title>
    <!-- 谷歌字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --color-brand-soft: #f4f7f4;
            --color-brand-sage: #86a789;
            --color-brand-leaf: #3d5a40;
            --color-brand-paper: #fefefe;
            --color-brand-stone: #f8f8f6;
            --color-brand-offwhite: #fdfdfc;
        }

        body {
            background-color: #f7f9f7;
            font-family: 'Inter', sans-serif;
            color: #1a1c1a;
            -webkit-font-smoothing: antialiased;
        }

        .font-display { font-family: 'Outfit', sans-serif; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 模拟 Framer Motion 的简单过渡 */
        .fade-enter { opacity: 0; transform: translateY(10px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: all 0.4s ease-out; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            soft: '#f4f7f4',
                            sage: '#86a789',
                            leaf: '#3d5a40',
                            paper: '#fefefe',
                            stone: '#f8f8f6',
                            offwhite: '#fdfdfc',
                        }
                    },
                    fontFamily: {
                        display: ['Outfit', 'sans-serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Mock Data ---
        const MOCK_PRODUCTS = [
            {
                id: '1',
                title: '林间微光：莫干山竹林深处隐世民宿',
                type: 'hotel',
                price: 1280,
                rating: 4.8,
                image: 'https://images.unsplash.com/photo-1542718610-a1d656d1884c?auto=format&fit=crop&q=80&w=800',
                location: '浙江 · 莫干山',
                tags: ['禅意', '竹林'],
                description: '在竹影摇曳中苏醒，感受山间第一缕清晨的微光。这不仅是一次住宿，更是一场与自然的深度对话。',
                optionGroups: [
                    {
                        id: 'room',
                        title: '房型选择',
                        options: [
                            { id: 'standard', name: '竹影大床房', priceDelta: 0 },
                            { id: 'suite', name: '云端景观露台套房', priceDelta: 600 }
                        ]
                    }
                ]
            },
            {
                id: '2',
                title: '西湖慢行：私人摇橹船茶事体验',
                type: 'ticket',
                price: 458,
                rating: 4.9,
                image: 'https://images.unsplash.com/photo-1599577310318-830336217dc3?auto=format&fit=crop&q=80&w=800',
                location: '浙江 · 杭州',
                tags: ['非遗', '茶席'],
                description: '避开断桥的人潮，划向湖心深处。在水波粼粼中煮一壶龙井，听船夫讲述旧时的故事。',
                optionGroups: [
                    {
                        id: 'tea',
                        title: '茶品选择',
                        options: [
                            { id: 'longjing', name: '明前龙井', priceDelta: 0 },
                            { id: 'tieguanyin', name: '陈年铁观音', priceDelta: 100 }
                        ]
                    }
                ]
            },
            {
                id: '3',
                title: '三亚海物语：隐世悬崖酒店 + 帆船体验',
                type: 'package',
                price: 3580,
                rating: 4.9,
                image: 'https://images.unsplash.com/photo-1540206395-6880f9490e44?auto=format&fit=crop&q=80&w=800',
                location: '海南 · 三亚',
                tags: ['私人定制', '海趣'],
                description: '在半岛的尽头寻找那一抹纯粹的蓝。包含顶级设计感悬崖酒店及私属帆船出海，让海风吹散城市的喧嚣。',
                optionGroups: [
                    {
                        id: 'hotel_type',
                        title: '房型方案',
                        options: [
                            { id: 'sea_view', name: '尊享海景房', priceDelta: 0 },
                            { id: 'pool_villa', name: '私人泳池别墅', priceDelta: 1200 }
                        ]
                    },
                    {
                        id: 'activity',
                        title: '配套活动',
                        options: [
                            { id: 'sailing', name: '日落帆船出海', priceDelta: 0 },
                            { id: 'diving', name: '专业自由潜体验', priceDelta: 500 }
                        ]
                    }
                ]
            }
        ];

        const CATEGORIES = [
            { id: 'all', name: '全部', icon: 'sparkles' },
            { id: 'hotel', name: '宿集', icon: 'tent' },
            { id: 'ticket', name: '游历', icon: 'navigation' },
            { id: 'package', name: '组合', icon: 'waves' },
            { id: 'opendate', name: '期票', icon: 'clock' },
        ];

        // --- Helper: Icon Component for Static ---
        const Icon = ({ name, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // --- Main App ---
        const App = () => {
            const [view, setView] = useState('home'); // home, details, checkout, success
            const [activeCategory, setActiveCategory] = useState('all');
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [selectedOptions, setSelectedOptions] = useState({});
            const [quantity, setQuantity] = useState(1);
            
            // Checkout Form State
            const [mainContact, setMainContact] = useState({ name: '', phone: '', idCard: '' });
            const [guests, setGuests] = useState([]); // Array of { name: '', idCard: '' }
            
            // Generated Order Info
            const [orderInfo, setOrderInfo] = useState(null);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [view, guests]);

            const calculateTotalDelta = () => {
                if (!selectedProduct?.optionGroups) return 0;
                let delta = 0;
                selectedProduct.optionGroups.forEach(group => {
                    const selectedId = selectedOptions[group.id];
                    const option = group.options.find(o => o.id === selectedId);
                    if (option) delta += option.priceDelta;
                });
                return delta;
            };

            const handleProductSelect = (p) => {
                setSelectedProduct(p);
                setQuantity(1);
                const defaults = {};
                p.optionGroups?.forEach(group => {
                    defaults[group.id] = group.options[0].id;
                });
                setSelectedOptions(defaults);
                setView('details');
                window.scrollTo(0, 0);
            };

            const handleAddGuest = () => {
                setGuests([...guests, { name: '', idCard: '' }]);
            };

            const handleGuestChange = (index, field, value) => {
                const newGuests = [...guests];
                newGuests[index][field] = value;
                setGuests(newGuests);
            };

            const handlePay = () => {
                const now = new Date();
                const orderData = {
                    orderNumber: 'TRV' + now.getTime().toString().slice(-8),
                    orderTime: now.toLocaleString(),
                    product: selectedProduct,
                    options: selectedOptions,
                    total: currentTotalPrice,
                    mainContact,
                    guests,
                    quantity
                };
                setOrderInfo(orderData);
                setView('success');
                window.scrollTo(0, 0);
            };

            const currentTotalPrice = selectedProduct ? (selectedProduct.price + calculateTotalDelta()) * quantity : 0;

            const filteredProducts = MOCK_PRODUCTS.filter(product => {
                const matchesCategory = activeCategory === 'all' || product.type === activeCategory;
                const matchesSearch = product.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                     product.location.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            return (
                <div className="min-h-screen bg-brand-paper text-gray-900 font-sans max-w-md mx-auto relative overflow-x-hidden shadow-[0_40px_100px_rgba(0,0,0,0.05)] border-x border-gray-50/50">
                    
                    {view === 'home' && (
                        <div className="pb-32">
                            <header className="px-8 pt-20 pb-8">
                                <div className="flex justify-between items-center mb-10">
                                    <div className="flex flex-col">
                                        <span className="text-[10px] font-bold text-brand-sage uppercase tracking-[0.2em] mb-1">Morning, Traveler</span>
                                        <h1 className="text-3xl font-display font-medium tracking-tight">你好，旅人</h1>
                                    </div>
                                    <div className="w-12 h-12 rounded-[1.2rem] bg-brand-stone overflow-hidden ring-4 ring-white shadow-sm">
                                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Fresh" alt="User" />
                                    </div>
                                </div>

                                <div className="relative mb-10">
                                    <Icon name="search" className="absolute left-6 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300" />
                                    <input 
                                        type="text" 
                                        placeholder="寻找下一个理想地..." 
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        className="w-full bg-brand-stone rounded-[1.5rem] py-4 pl-14 pr-6 text-sm text-gray-800 focus:outline-none focus:ring-1 focus:ring-brand-sage/20 transition-all border-none"
                                    />
                                </div>

                                <div className="flex gap-4 overflow-x-auto no-scrollbar pb-2">
                                    {CATEGORIES.map(cat => (
                                        <button 
                                            key={cat.id}
                                            onClick={() => setActiveCategory(cat.id)}
                                            className="flex flex-col items-center gap-3 shrink-0"
                                        >
                                            <div className={`w-14 h-14 rounded-[1.5rem] flex items-center justify-center transition-all ${
                                                activeCategory === cat.id 
                                                ? 'bg-brand-sage text-white shadow-lg shadow-brand-sage/20 scale-105' 
                                                : 'bg-white text-gray-300 border border-gray-50 shadow-sm'
                                            }`}>
                                                <Icon name={cat.icon} className="w-5 h-5" />
                                            </div>
                                            <span className={`text-[10px] font-bold tracking-wider ${activeCategory === cat.id ? 'text-gray-900' : 'text-gray-300'}`}>
                                                {cat.name}
                                            </span>
                                        </button>
                                    ))}
                                </div>
                            </header>

                            <main className="px-8">
                                <div className="flex items-center gap-2 mb-8">
                                    <div className="w-1 h-5 bg-brand-sage rounded-full" />
                                    <h2 className="font-display font-medium text-xl text-gray-800 tracking-tight">今日微光</h2>
                                </div>

                                {filteredProducts.map(product => (
                                    <div 
                                        key={product.id}
                                        onClick={() => handleProductSelect(product)}
                                        className="bg-white rounded-[2.5rem] overflow-hidden border border-gray-50 shadow-[0_10px_30px_rgba(0,0,0,0.02)] mb-10 group cursor-pointer transition-transform hover:-translate-y-1"
                                    >
                                        <div className="relative aspect-[4/3] overflow-hidden">
                                            <img src={product.image} className="w-full h-full object-cover" />
                                            <div className="absolute top-4 left-4 bg-white/30 backdrop-blur-md px-3 py-1 rounded-full text-[9px] font-bold text-white tracking-widest uppercase">
                                                {product.location}
                                            </div>
                                        </div>
                                        <div className="p-8">
                                            <h3 className="font-display font-medium text-lg text-gray-900 mb-3">{product.title}</h3>
                                            <div className="flex items-center gap-4 mb-6">
                                                <div className="flex items-center gap-1 text-[10px] text-gray-400 font-medium">
                                                    <Icon name="star" className="w-3 h-3 fill-brand-sage text-brand-sage" /> {product.rating}
                                                </div>
                                                <div className="flex gap-2">
                                                    {product.tags.map(tag => (
                                                        <span key={tag} className="text-[9px] text-brand-sage bg-brand-soft px-2 py-0.5 rounded-full font-bold">#{tag}</span>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="flex justify-between items-center pt-5 border-t border-gray-50/50">
                                                <div className="flex items-baseline gap-1">
                                                    <span className="text-[10px] text-gray-300 font-bold tracking-widest">FROM</span>
                                                    <span className="text-xl font-display font-medium text-gray-900">¥{product.price}</span>
                                                </div>
                                                <div className="w-10 h-10 bg-brand-soft rounded-2xl flex items-center justify-center text-brand-leaf">
                                                    <Icon name="arrow-right" className="w-4 h-4" />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </main>

                            <nav className="fixed bottom-8 left-8 right-8 bg-white/90 backdrop-blur-2xl border border-white/50 rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.1)] z-50 p-2 flex items-center justify-around">
                                <Icon name="home" className="w-5 h-5 text-gray-900" />
                                <Icon name="compass" className="w-5 h-5 text-gray-300" />
                                <Icon name="message-circle" className="w-5 h-5 text-gray-300" />
                                <Icon name="user" className="w-5 h-5 text-gray-300" />
                            </nav>
                        </div>
                    )}

                    {view === 'details' && selectedProduct && (
                        <div className="pb-40 bg-white min-h-screen">
                            <div className="relative aspect-[4/5] overflow-hidden">
                                <img src={selectedProduct.image} className="w-full h-full object-cover" />
                                <div className="absolute inset-0 bg-gradient-to-b from-black/20 via-transparent to-white" />
                                <button onClick={() => setView('home')} className="absolute top-12 left-6 w-11 h-11 bg-white/40 backdrop-blur-xl border border-white/40 rounded-2xl flex items-center justify-center text-white shadow-lg">
                                    <Icon name="chevron-left" className="w-6 h-6" />
                                </button>
                            </div>

                            <div className="px-8 -mt-24 relative z-10">
                                <div className="bg-white rounded-[2.5rem] p-10 shadow-[0_20px_50px_rgba(0,0,0,0.06)] border border-gray-50/50">
                                    <div className="flex items-center gap-3 mb-6">
                                        <div className="text-[10px] font-bold text-brand-sage uppercase bg-brand-soft px-3 py-1 rounded-full tracking-wider">{selectedProduct.location}</div>
                                        <div className="flex items-center gap-1.5 text-[10px] font-bold text-gray-400">
                                            <Icon name="star" className="w-3 h-3 fill-brand-sage text-brand-sage" /> {selectedProduct.rating}
                                        </div>
                                    </div>
                                    <h1 className="text-2xl font-display font-medium text-gray-900 leading-[1.3] mb-6">{selectedProduct.title}</h1>
                                    <div className="space-y-4 mb-12">
                                        <h2 className="text-[10px] font-bold text-gray-300 uppercase tracking-[0.25em]">Journey Notes</h2>
                                        <p className="text-sm text-gray-400 leading-[1.8]">{selectedProduct.description}</p>
                                    </div>

                                    {selectedProduct.optionGroups?.map(group => (
                                        <div key={group.id} className="space-y-5 mb-10 pt-10 border-t border-gray-50/50">
                                            <h3 className="text-[10px] font-bold text-gray-300 uppercase tracking-widest">{group.title}</h3>
                                            <div className="flex flex-col gap-3">
                                                {group.options.map(opt => {
                                                    const isActive = selectedOptions[group.id] === opt.id;
                                                    return (
                                                        <button
                                                            key={opt.id}
                                                            onClick={() => setSelectedOptions(prev => ({...prev, [group.id]: opt.id}))}
                                                            className={`flex justify-between items-center p-6 rounded-[1.8rem] border-2 transition-all duration-300 ${
                                                                isActive 
                                                                ? 'bg-brand-soft border-brand-sage shadow-md shadow-brand-sage/5' 
                                                                : 'bg-brand-stone border-transparent hover:border-gray-100'
                                                            }`}
                                                        >
                                                            <span className={`text-sm font-medium ${isActive ? 'text-brand-leaf' : 'text-gray-600'}`}>{opt.name}</span>
                                                            {opt.priceDelta !== 0 && (
                                                                <span className={`text-[10px] font-bold ${isActive ? 'text-brand-sage' : 'text-gray-400'}`}>
                                                                    {opt.priceDelta > 0 ? `+¥${opt.priceDelta}` : `-¥${Math.abs(opt.priceDelta)}`}
                                                                </span>
                                                            )}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}

                                    <div className="flex items-center justify-between pt-6">
                                        <span className="text-[10px] font-bold text-gray-300 uppercase tracking-widest">Quantity</span>
                                        <div className="flex items-center gap-6 bg-brand-stone rounded-2xl p-2 px-3">
                                            <button onClick={() => setQuantity(Math.max(1, quantity-1))} className="w-8 h-8 rounded-xl flex items-center justify-center bg-white border border-gray-50 text-gray-300"><Icon name="minus" className="w-3 h-3" /></button>
                                            <span className="text-sm font-bold w-4 text-center">{quantity}</span>
                                            <button onClick={() => setQuantity(quantity+1)} className="w-8 h-8 rounded-xl flex items-center justify-center bg-gray-900 text-white"><Icon name="plus" className="w-3 h-3" /></button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="fixed bottom-0 left-0 right-0 p-10 pt-4 bg-white/80 backdrop-blur-3xl border-t border-gray-50/50 flex items-center justify-between z-50">
                                <div className="flex flex-col">
                                    <span className="text-[9px] text-gray-300 uppercase font-bold tracking-widest mb-1">Total Fee</span>
                                    <div className="text-2xl font-display font-medium text-gray-900">
                                        <span className="text-sm mr-1 opacity-40">¥</span>{currentTotalPrice}
                                    </div>
                                </div>
                                <button onClick={() => setView('checkout')} className="bg-gray-900 text-white h-16 px-12 rounded-[1.8rem] font-bold flex items-center gap-3 shadow-2xl text-sm">
                                    开始预订 <Icon name="arrow-right" className="w-4 h-4 text-brand-sage" />
                                </button>
                            </div>
                        </div>
                    )}

                    {view === 'checkout' && (
                        <div className="p-10 pb-40">
                            <div className="flex items-center gap-6 mb-12">
                                <button onClick={() => setView('details')} className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center border border-gray-50"><Icon name="chevron-left" className="w-5 h-5 text-gray-300" /></button>
                                <h1 className="text-xl font-display font-medium tracking-tight">完善预订信息</h1>
                            </div>

                            {/* Summary Card */}
                            <div className="bg-white rounded-[2.5rem] p-6 shadow-sm border border-gray-50 mb-10 flex gap-4 items-center">
                                <img src={selectedProduct.image} className="w-16 h-16 rounded-2xl object-cover" />
                                <div className="flex-1">
                                    <h3 className="text-xs font-bold text-gray-800 leading-tight mb-1">{selectedProduct.title}</h3>
                                    <p className="text-[10px] text-brand-sage font-bold uppercase">QTY: {quantity} · ¥{currentTotalPrice}</p>
                                </div>
                            </div>

                            <div className="space-y-12">
                                {/* Main Contact Group */}
                                <div className="space-y-5">
                                    <div className="flex items-center justify-between px-2">
                                        <h2 className="text-[10px] font-bold text-gray-300 uppercase tracking-widest">Main Contact</h2>
                                        <Icon name="user-check" className="w-3.5 h-3.5 text-brand-sage" />
                                    </div>
                                    <div className="space-y-3">
                                        <input 
                                            type="text" 
                                            placeholder="预订人姓名" 
                                            value={mainContact.name}
                                            onChange={(e) => setMainContact({...mainContact, name: e.target.value})}
                                            className="w-full bg-white border border-gray-50 rounded-[1.2rem] py-4 px-6 text-sm focus:ring-1 focus:ring-brand-sage/20 placeholder:text-gray-200" 
                                        />
                                        <input 
                                            type="tel" 
                                            placeholder="联系电话" 
                                            value={mainContact.phone}
                                            onChange={(e) => setMainContact({...mainContact, phone: e.target.value})}
                                            className="w-full bg-white border border-gray-50 rounded-[1.2rem] py-4 px-6 text-sm focus:ring-1 focus:ring-brand-sage/20 placeholder:text-gray-200" 
                                        />
                                        <input 
                                            type="text" 
                                            placeholder="身份证号" 
                                            value={mainContact.idCard}
                                            onChange={(e) => setMainContact({...mainContact, idCard: e.target.value})}
                                            className="w-full bg-white border border-gray-50 rounded-[1.2rem] py-4 px-6 text-sm focus:ring-1 focus:ring-brand-sage/20 placeholder:text-gray-200" 
                                        />
                                    </div>
                                </div>

                                {/* Accompanying Guests Group */}
                                <div className="space-y-5">
                                    <div className="flex items-center justify-between px-2">
                                        <h2 className="text-[10px] font-bold text-gray-300 uppercase tracking-widest">Accompanying Guests</h2>
                                        <button onClick={handleAddGuest} className="text-brand-sage flex items-center gap-1.5 text-[10px] font-bold">
                                            <Icon name="plus-circle" className="w-3.5 h-3.5" /> 添加随行
                                        </button>
                                    </div>
                                    
                                    {guests.length === 0 && (
                                        <div className="bg-brand-stone/50 border border-dashed border-gray-200 rounded-[1.2rem] p-8 text-center text-[10px] text-gray-300 font-bold">
                                            暂无随行人员
                                        </div>
                                    )}

                                    {guests.map((g, idx) => (
                                        <div key={idx} className="bg-brand-stone/40 p-5 rounded-[1.5rem] border border-gray-100 flex flex-col gap-3 relative">
                                            <button 
                                                onClick={() => setGuests(guests.filter((_, i) => i !== idx))}
                                                className="absolute top-4 right-4 text-gray-300"
                                            ><Icon name="x" className="w-3.5 h-3.5" /></button>
                                            <span className="text-[8px] font-extrabold text-gray-300 uppercase">Guest {idx + 1}</span>
                                            <input 
                                                type="text" 
                                                placeholder="姓名" 
                                                value={g.name}
                                                onChange={(e) => handleGuestChange(idx, 'name', e.target.value)}
                                                className="w-full bg-white border border-gray-50 rounded-xl py-3 px-4 text-xs placeholder:text-gray-200"
                                            />
                                            <input 
                                                type="text" 
                                                placeholder="身份证号" 
                                                value={g.idCard}
                                                onChange={(e) => handleGuestChange(idx, 'idCard', e.target.value)}
                                                className="w-full bg-white border border-gray-50 rounded-xl py-3 px-4 text-xs placeholder:text-gray-200"
                                            />
                                        </div>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="fixed bottom-10 left-10 right-10">
                                <button onClick={handlePay} className="w-full bg-gray-900 text-white rounded-[1.8rem] h-18 font-bold flex items-center justify-center gap-3 shadow-2xl transition-transform active:scale-95">
                                    确认支付 ¥{currentTotalPrice} <Icon name="arrow-right" className="w-4 h-4 text-brand-sage" />
                                </button>
                            </div>
                        </div>
                    )}

                    {view === 'success' && orderInfo && (
                        <div className="flex flex-col items-center min-h-screen p-8 bg-brand-stone">
                            <div className="pt-12 mb-10 text-center">
                                <div className="w-20 h-20 bg-white rounded-[2rem] flex items-center justify-center text-brand-leaf mx-auto mb-6 shadow-xl relative">
                                    <Icon name="check-circle-2" className="w-10 h-10" />
                                    <div className="absolute -top-2 -right-2 bg-brand-sage text-white p-1.5 rounded-full shadow-lg">
                                        <Icon name="sparkles" className="w-3 h-3" />
                                    </div>
                                </div>
                                <h1 className="text-3xl font-display font-medium text-gray-900 mb-2">预订成功</h1>
                                <p className="text-xs text-gray-400 font-medium uppercase tracking-[0.2em]">Booking Confirmed</p>
                            </div>

                            {/* Ticket Style Card */}
                            <div className="w-full bg-white rounded-[2.5rem] overflow-hidden shadow-[0_30px_60px_rgba(0,0,0,0.08)] relative">
                                {/* Ticket Notch */}
                                <div className="absolute top-[62%] -left-3 w-6 h-6 bg-brand-stone rounded-full"></div>
                                <div className="absolute top-[62%] -right-3 w-6 h-6 bg-brand-stone rounded-full"></div>
                                <div className="absolute top-[63.2%] left-6 right-6 border-b border-dashed border-gray-100"></div>

                                <div className="p-8">
                                    <div className="flex justify-between items-start mb-8">
                                        <div className="flex flex-col">
                                            <span className="text-[8px] font-bold text-gray-300 uppercase mb-1 tracking-widest">Order Number</span>
                                            <span className="text-xs font-bold text-gray-800">{orderInfo.orderNumber}</span>
                                        </div>
                                        <div className="flex flex-col items-end">
                                            <span className="text-[8px] font-bold text-gray-300 uppercase mb-1 tracking-widest">Order Time</span>
                                            <span className="text-[10px] font-bold text-gray-800">{orderInfo.orderTime}</span>
                                        </div>
                                    </div>

                                    <div className="mb-8 p-4 bg-brand-soft rounded-2xl flex gap-4 items-center">
                                        <img src={orderInfo.product.image} className="w-12 h-12 rounded-xl object-cover" />
                                        <div className="flex-1">
                                            <h3 className="text-xs font-bold text-gray-800 leading-tight mb-0.5">{orderInfo.product.title}</h3>
                                            <p className="text-[9px] text-gray-400 font-medium">席位: {orderInfo.quantity} · 方案: {Object.values(orderInfo.options).map(v => v).join(' + ')}</p>
                                        </div>
                                    </div>

                                    <div className="space-y-6">
                                        <div className="grid grid-cols-2 gap-6">
                                            <div>
                                                <span className="text-[8px] font-bold text-gray-300 uppercase block mb-1">Passanger</span>
                                                <p className="text-xs font-bold text-gray-800">{orderInfo.mainContact.name}</p>
                                            </div>
                                            <div>
                                                <span className="text-[8px] font-bold text-gray-300 uppercase block mb-1">Contact</span>
                                                <p className="text-xs font-bold text-gray-800">{orderInfo.mainContact.phone}</p>
                                            </div>
                                        </div>
                                        {orderInfo.guests.length > 0 && (
                                            <div>
                                                <span className="text-[8px] font-bold text-gray-300 uppercase block mb-1">Guests</span>
                                                <p className="text-[10px] font-bold text-gray-600">
                                                    {orderInfo.guests.map(g => g.name).join('、')}
                                                </p>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="p-10 pt-16 flex flex-col items-center bg-gray-50/50">
                                    <div className="w-32 h-32 bg-white p-3 rounded-2xl shadow-inner border border-gray-100 mb-4 opacity-80 backdrop-blur-sm">
                                        {/* Simple Mock QR */}
                                        <div className="w-full h-full bg-gray-900 rounded flex items-center justify-center flex-wrap gap-1 p-2">
                                            {[...Array(64)].map((_, i) => (
                                                <div key={i} className={`w-2 h-2 rounded-sm ${Math.random() > 0.5 ? 'bg-white' : 'bg-transparent'}`}></div>
                                            ))}
                                        </div>
                                    </div>
                                    <p className="text-[9px] font-bold text-gray-300 uppercase tracking-widest">Scan for Check-in</p>
                                </div>
                            </div>

                            <div className="mt-12 flex gap-4 w-full">
                                <button className="flex-1 h-14 bg-white border border-gray-100 rounded-2xl font-bold text-xs text-gray-500 shadow-sm active:scale-95 transition-transform">保存凭证</button>
                                <button onClick={() => setView('home')} className="flex-1 h-14 bg-gray-900 rounded-2xl font-bold text-xs text-white shadow-xl active:scale-95 transition-transform">探索更多</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
